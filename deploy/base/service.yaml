apiVersion: v1
kind: Service
metadata:
  name: unee-marsgate
  labels:
    app: unee-marsgate
spec:
  selector:
    app: unee-marsgate
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      protocol: TCP
    - name: grpc
      port: 50051
      targetPort: 50051
      protocol: TCP
  type: ClusterIP
