# Staging 环境特定配置
apiVersion: apps/v1
kind: Deployment
metadata:
  name: unee-marsgate
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: unee-marsgate
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
