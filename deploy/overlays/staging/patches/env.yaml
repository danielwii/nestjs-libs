apiVersion: apps/v1
kind: Deployment
metadata:
  name: unee-marsgate
spec:
  template:
    spec:
      containers:
        - name: unee-marsgate
          env:
            - name: TZ
              value: America/Los_Angeles
            - name: REDIS_URL
              value: redis://redis-master.unee-staging.svc.cluster.local:6379
            - name: LOG_LEVEL
              value: debug
            - name: PORT
              value: "3000"
            - name: DOPPLER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: doppler-token-marsgate
                  key: token
