name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: 🛡️ Quality Guard
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v6

      - name: 🥟 Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: 📦 Install Dependencies
        run: bun install

      - name: 🧹 Lint (ESLint)
        run: bun run lint

      - name: 👮 Type Check (TSC)
        run: bun run typecheck

      - name: 🧪 Run Tests & Coverage
        run: |
          # 运行测试并将输出捕获到文件，同时保留退出码
          # 使用 pipefail 确保如果测试失败，整个管道返回失败
          set -o pipefail

          # 运行测试，捕获输出
          bun test --coverage 2>&1 | tee test-output.log

          TEST_EXIT_CODE=$?

          # --- 生成 GitHub Summary ---
          echo "## 🧪 Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ $TEST_EXIT_CODE -eq 0 ]; then
             echo "✅ **All tests passed!**" >> $GITHUB_STEP_SUMMARY
          else
             echo "❌ **Tests Failed!** Check the logs for details." >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📊 Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo '```text' >> $GITHUB_STEP_SUMMARY
          # 尝试提取覆盖率表格（从 'File' 开始到结束）
          if grep -q "File" test-output.log; then
            sed -n '/File/,$p' test-output.log >> $GITHUB_STEP_SUMMARY
          else
            tail -n 30 test-output.log >> $GITHUB_STEP_SUMMARY
          fi
          echo '```' >> $GITHUB_STEP_SUMMARY

          # 如果测试失败，抛出错误中止 Action
          exit $TEST_EXIT_CODE
